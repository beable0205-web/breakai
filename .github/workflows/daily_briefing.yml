name: Daily Market Briefing Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '30 23 * * *' # Run at 23:30 UTC (08:30 KST) daily

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install # Fallback to install if package-lock is missing

      - name: Run Market Briefing Script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate_daily_briefing.mjs

      - name: Auto-commit and Push generated reports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Check if there are any changes to commit before running git commit
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-generated Daily Market Briefing [skip ci]"
            git push origin main
          else
            echo "No changes to commit."
          fi
